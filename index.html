<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Video</title>
<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}
video{
    width:100vw;
    height:100vh;
    object-fit:contain;
}
</style>
</head>
<body>

<video id="video" autoplay muted playsinline>
    <source src="movie.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("video");
video.play().catch(()=>{});
</script>

</body>
</html>
